name: Deploy Israeli Scraper to Railway

on:
  push:
    branches:
      - main
    paths:
      - 'israeli-scraper-service/**'
      - '.github/workflows/deploy-scraper.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Railway Deployment
        run: |
          # Railway auto-deploys when you connect via GitHub App
          # This workflow confirms deployment is triggered
          echo "Deployment triggered - Railway will auto-deploy via GitHub integration"
        shell: bash
